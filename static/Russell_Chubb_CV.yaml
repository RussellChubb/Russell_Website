        highlights:
          - Developed and maintained data pipelines, analytical models, and dashboards
            spanning P&L, emissions, and engineering/PI data to support decision-making
            across the Generation Business Unit
          - Sole front-end developer for **OptiX** (Streamlit on Databricks) — enabling
            outage valuation, scenario modelling, market data visualisation, and outage
            optimisation for site owners, maintenance leads, and generation planners;
            returned ~$620K in commercial value by directly supporting outage scheduling
            decisions across Meridian's generation portfolio
          - Built a Power BI P&L Overheads Dashboard enabling budget-holders to analyse
            overhead spend in detail — directly identifying unnecessary spending and
            saving ~$500K
          - Built and delivered Power BI dashboards and reports for stakeholders ranging
            from engineers and analysts through to executives and board-level audiences
          - Built a full stakeholder **CRM** from scratch in Power Apps — replacing a
            manual Loop-based process, with SharePoint-backed document uploads via Power
            Automate, role-based access control, an audit logging system, and an embedded
            Power BI analytics layer; onboarded 50+ users across the Generation Business Unit
          - Designed and delivered a full-stack **Suggestion Box** platform in Power Apps
            (Canvas) — featuring a voting engine, admin triage workflow, automated
            notifications via Power Automate, SharePoint file attachments, and an embedded
            Power BI analytics layer backed by SQL on the Meridian Data Platform; deployed
            in both desktop and mobile versions
          - Worked in Agile and Waterfall environments using Jira and Miro to collaborate
            across engineering, portfolio, and planning teams — defining requirements,
            managing delivery risk, and shipping iterative improvements
          - Produced internal product communications including video walkthroughs
            (Premiere Pro) and graphic design/marketing assets (Photoshop) to drive
            adoption of new tooling

      - company: Ministry of Education
