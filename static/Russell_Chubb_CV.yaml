        end_date: 2024-08
        highlights:
          - Extracted and transformed website data via GA4; created customised GTM tags
            to support content and marketing objectives
          - Built 30 tailored analytics dashboards for internal business groups in
            Looker Studio
          - Managed creation, configuration, and consulting for SurveyMonkey surveys;
            migrated 100 surveys from a legacy forms platform
          - Established a GA4 to BigQuery data pipeline and migrated the Vimeo account
            to an Enterprise solution
          - Performed functional and accessibility testing of Ministry websites;
            CMS/backend content uploading and editing in SilverStripe and Drupal

      - company: Ministry of Education
        position: Adviser – Equity Index Implementation
        location: Wellington, NZ
        start_date: 2021-10
        end_date: 2023-02
        highlights:
          - Implemented Equity Funding tooling to identify and respond to socio-economic
            barriers in schools, collaborating across business groups to define
            requirements and manage delivery risk
          - Prepared and maintained project documentation; engaged Ministry business
            unit experts to provide bespoke advice and solutions
          - Successfully launched January 2023 — schools received new equity-based
            funding, with multiple Ministry initiatives transitioned to the new system
          - Won the Excellence in Public Policy 2023 **'Spirit of Service' Award**

