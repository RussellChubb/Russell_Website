# Whether this language is enabled for the site
disabled = false
# The IETF language tag for this language
languageCode = "en"
# Human-readable name for this language
languageName = "English"
# Priority of this language when multiple languages are configured (lower = higher priority)
weight = 1
# The site title shown in the browser tab and header
title = "Russell's Website"

[params]
# Short language code shown in the language switcher UI
displayName = "EN"
# ISO language code used for HTML lang attribute and SEO
isoCode = "en"
# Whether this language reads right-to-left
rtl = false
# Format for displaying dates across the site (Go date format)
dateFormat = "2 January 2006"
# Logo shown in the top-left corner of the site (stored in assets/)
logo = "Logo_Trans.png" # Transpearent Logo for the top left corner
# Secondary logo (e.g. used in light mode if different from primary)
secondaryLogo = "Logo_Trans.png"
# Site description used in meta tags for SEO
description = "Russell's Website"
# Copyright notice shown in the footer
copyright = "© 2026 Russell Chubb"

[params.author]
# Display name of the author
name = "Russell Chubb"
# Author email address (used for reply-by-email feature)
