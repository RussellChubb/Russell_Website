# -- Main Menu --
# The main menu is displayed in the header at the top of the page.
# Acceptable parameters are name, pageRef, page, url, title, weight.
# 
# The simplest menu configuration is to provide:
#   name = The name to be displayed for this menu link
#   pageRef = The identifier of the page or section to link to
#
# By default the menu is ordered alphabetically. This can be
# overridden by providing a weight value. The menu will then be
# ordered by weight from lowest to highest.

# Blog link — points to content/posts/
[[main]]
name = "Blog"
pageRef = "posts"
weight = 10       # First item in the menu

# Resume link — points to content/resume/
[[main]]
name = "Resume"
pageRef = "resume"
weight = 20        # Second item in the menu

# About link — points to content/about/
[[main]]
name = "About"
pageRef = "about"
weight = 30       # Third item in the menu

# Projects link — points to content/projects/
[[main]]
name = "Projects"
pageRef = "projects"
weight = 40          # Fourth item in the menu

# Example of a dropdown sub-item under Projects
# Uncomment to add individual project links nested under the Projects menu item
# [[main]]
